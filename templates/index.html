<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AROHA AI Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f4f7f6; font-family: sans-serif; }
        .sidebar { width: 240px; position: fixed; height: 100vh; background: white; border-right: 1px solid #ddd; padding: 20px; }
        .main { margin-left: 240px; padding: 30px; }
        .tab-content { display: none; }
        .active { display: block; }
        .nav-link { cursor: pointer; padding: 12px; border-radius: 8px; color: #555; margin-bottom: 5px; }
        .nav-link:hover, .active-tab { background: #0d6efd; color: white !important; font-weight: bold; }
        #load { display: none; }
    </style>
</head>
<body>

<div class="sidebar shadow-sm">
    <h4 class="text-primary fw-bold mb-4">AROHA AI</h4>
    <div class="nav-link active-tab" id="n-scan" onclick="showTab('scan')">New Analysis</div>
    <div class="nav-link" id="n-history" onclick="showTab('history')">History</div>
</div>

<div class="main">
    <div id="tab-scan" class="tab-content active">
        <div class="card p-4 border-0 shadow-sm">
            <div class="row">
                <div class="col-md-5">
                    <h5 class="fw-bold mb-3">Patient Data</h5>
                    <input type="text" id="ptName" class="form-control mb-2" placeholder="Full Name">
                    <input type="number" id="ptAge" class="form-control mb-2" placeholder="Age">
                    <select id="ptGender" class="form-select mb-3"><option>Male</option><option>Female</option></select>
                    <input type="file" id="fileInput" class="form-control mb-3">
                    <button onclick="analyze()" class="btn btn-primary w-100 fw-bold">Run Analysis</button>
                    <div id="load" class="mt-3 text-center"><div class="spinner-border text-primary"></div></div>
                </div>
                <div class="col-md-7 ps-4" id="res" style="display:none;">
                    <h6 class="text-muted small text-uppercase">AI Synopsis</h6>
                    <p id="syn" class="fw-bold fs-5"></p>
                    <div class="alert alert-info" id="diag"></div>
                    <h3 class="fw-bold">₹ <span id="cost"></span></h3>
                    <span id="risk" class="badge p-2 px-3"></span>
                </div>
            </div>
        </div>
    </div>

    <div id="tab-history" class="tab-content">
        <h3 class="fw-bold mb-4">Past Records</h3>
        <div class="card p-3 border-0 shadow-sm">
            <table class="table"><tbody id="h-table"></tbody></table>
        </div>
    </div>
</div>

<script>
    function showTab(t) {
        document.querySelectorAll('.tab-content').forEach(x => x.classList.remove('active'));
        document.getElementById('tab-' + t).classList.add('active');
        document.querySelectorAll('.nav-link').forEach(x => x.classList.remove('active-tab'));
        document.getElementById('n-' + t).classList.add('active-tab');
        if(t === 'history') loadH();
    }

    async function analyze() {
        document.getElementById('load').style.display = 'block';
        document.getElementById('res').style.display = 'none';

        const formData = new FormData();
        formData.append('file', document.getElementById('fileInput').files[0]);
        formData.append('name', document.getElementById('ptName').value);
        formData.append('age', document.getElementById('ptAge').value);
        formData.append('gender', document.getElementById('ptGender').value);

        try {
            const res = await fetch('/predict', { method: 'POST', body: formData });
            const json = await res.json();
            
            if(json.status === "success") {
                const d = json.data;
                document.getElementById('syn').innerText = d.synopsis;
                document.getElementById('diag').innerText = d.diagnosis;
                document.getElementById('cost').innerText = d.estimated_cost;
                
                const riskBadge = document.getElementById('risk');
                riskBadge.innerText = d.risk_level + " RISK";
                riskBadge.className = "badge p-2 px-3 " + (d.risk_level === 'High' ? 'bg-danger' : 'bg-success');
                
                document.getElementById('res').style.display = 'block';
            }
        } catch(e) { alert("Analysis failed. Check console."); }
        finally { document.getElementById('load').style.display = 'none'; }
    }

    async function loadH() {
        const res = await fetch('/api/history');
        const data = await res.json();
        const b = document.getElementById('h-table');
        b.innerHTML = "<tr><th>Date</th><th>Name</th><th>Findings</th><th>Cost</th></tr>";
        data.forEach(h => { 
            b.innerHTML += `<tr><td>${h.date}</td><td>${h.name}</td><td>${h.diagnosis.substring(0,40)}...</td><td>₹${h.cost}</td></tr>`; 
        });
    }
</script>
</body>
</html>
