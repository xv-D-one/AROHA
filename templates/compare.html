<!DOCTYPE html>
<html>

<head>
    <title>Compare Reports - AROHA Medical AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 min-h-screen">

    <div class="container mx-auto px-4 py-8">

        <h1 class="text-3xl font-bold text-center text-green-600 mb-8">Compare Medical Reports</h1>

        <div class="bg-white shadow-lg rounded-lg p-6 mb-8">
            <h2 class="text-2xl font-semibold mb-4">Upload Two Reports for Comparison</h2>

            <form action="/compare_reports" method="post" enctype="multipart/form-data" class="space-y-4">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700">Report 1</label>
                        <input type="file" name="report1"
                            class="mt-1 block w-full border-gray-300 rounded-md shadow-sm focus:ring-green-500 focus:border-green-500">
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-700">Report 2</label>
                        <input type="file" name="report2"
                            class="mt-1 block w-full border-gray-300 rounded-md shadow-sm focus:ring-green-500 focus:border-green-500">
                    </div>
                </div>

                <button type="submit"
                    class="bg-green-600 text-white px-6 py-2 rounded-md hover:bg-green-700 focus:outline-none focus:ring-2 focus:ring-green-500">Compare
                    Reports</button>
            </form>
        </div>

        {% if comparison %}

        <div class="bg-white shadow-lg rounded-lg p-6 mb-8">
            <h2 class="text-2xl font-semibold mb-4 text-orange-600">Comparison Results</h2>

            <div class="mb-4">
                <p><strong>Report 1 Type:</strong> {{ analysis1.report_type }}</p>
                <p><strong>Report 2 Type:</strong> {{ analysis2.report_type }}</p>
            </div>

            <div class="mb-6">
                <h3 class="text-xl font-medium mb-2">Key Differences</h3>
                <div class="bg-orange-50 p-4 rounded">
                    <ul class="space-y-1">
                        {% for c in comparison %}
                        <li class="text-orange-700">{{ c }}</li>
                        {% endfor %}
                    </ul>
                </div>
            </div>

            <div class="flex space-x-4">
                <a href="/" class="bg-gray-600 text-white px-4 py-2 rounded-md hover:bg-gray-700">Back to Home</a>
                <a href="/logout" class="bg-red-600 text-white px-4 py-2 rounded-md hover:bg-red-700">Log Out</a>
            </div>

        </div>

        {% endif %}

    </div>

</body>

</html>
